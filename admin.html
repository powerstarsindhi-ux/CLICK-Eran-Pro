<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Admin Panel | Click Eran Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<style>
:root{
  --bg:#030714; --card:#0a1025; --card-dark:#060d1f;
  --border:#1a2545; --cyan:#00c6ff; --purple:#9333ea;
  --grad:linear-gradient(135deg,#00c6ff,#9333ea);
  --muted:#6b7fa3; --success:#00e676; --danger:#ff3d71; --warn:#ff9d00;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{min-height:100%;font-family:'Nunito',sans-serif;background:var(--bg);color:#fff;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background-image:linear-gradient(rgba(0,198,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,198,255,0.03) 1px,transparent 1px);background-size:40px 40px;}

/* LOGIN */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;position:relative;z-index:1;}
.login-card{background:var(--card);border:1px solid var(--border);border-radius:22px;padding:32px 24px;width:100%;max-width:360px;}
.login-title{font-family:'Rajdhani',sans-serif;font-size:24px;font-weight:700;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-align:center;margin-bottom:6px;}
.login-sub{font-size:12px;color:var(--muted);text-align:center;margin-bottom:24px;font-weight:600;}
.inp{width:100%;background:var(--card-dark);border:1.5px solid var(--border);color:#fff;padding:13px 15px;border-radius:12px;font-size:14px;outline:none;font-family:'Nunito',sans-serif;margin-bottom:12px;}
.inp:focus{border-color:var(--cyan);}
.login-btn{width:100%;padding:14px;background:var(--grad);border:none;border-radius:12px;color:#fff;font-size:15px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;}

/* HEADER */
.header{background:rgba(3,7,20,0.97);border-bottom:1px solid var(--border);padding:14px 18px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;backdrop-filter:blur(14px);}
.header-logo{font-family:'Rajdhani',sans-serif;font-size:20px;font-weight:700;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.logout-btn{background:rgba(255,61,113,0.1);border:1px solid rgba(255,61,113,0.3);color:var(--danger);padding:7px 14px;border-radius:10px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif;}

/* TABS */
.tabs{display:flex;background:var(--card);border-bottom:1px solid var(--border);position:sticky;top:57px;z-index:99;}
.tab{flex:1;padding:13px;text-align:center;font-size:12px;font-weight:800;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:.2s;letter-spacing:.3px;}
.tab.active{color:var(--cyan);border-bottom-color:var(--cyan);}
.tab-badge{background:var(--danger);color:#fff;border-radius:20px;padding:1px 7px;font-size:10px;margin-left:4px;font-weight:800;}

/* CONTENT */
.page-content{padding:16px;position:relative;z-index:1;padding-bottom:40px;}
.tab-panel{display:none;}
.tab-panel.active{display:block;}

/* SECTION */
.section-title{font-size:11px;font-weight:800;color:var(--cyan);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.section-title::after{content:'';flex:1;height:1px;background:var(--border);}

/* REQUEST CARD */
.req-card{background:var(--card);border:1px solid var(--border);border-radius:16px;margin-bottom:12px;overflow:hidden;}
.req-card.approved{border-color:rgba(0,230,118,0.3);}
.req-card.rejected{border-color:rgba(255,61,113,0.25);opacity:.7;}
.req-card.pending{border-color:rgba(255,157,0,0.3);}

.req-header{padding:12px 16px;display:flex;align-items:center;justify-content:space-between;background:rgba(255,255,255,0.03);border-bottom:1px solid var(--border);}
.req-user{font-family:'Rajdhani',sans-serif;font-size:17px;font-weight:700;color:#fff;}
.req-id{font-size:11px;color:var(--muted);margin-top:1px;}
.req-status{font-size:11px;font-weight:800;padding:4px 10px;border-radius:20px;}
.st-pending {background:rgba(255,157,0,0.12); color:var(--warn);  border:1px solid rgba(255,157,0,0.3);}
.st-approved{background:rgba(0,230,118,0.12); color:var(--success);border:1px solid rgba(0,230,118,0.3);}
.st-rejected{background:rgba(255,61,113,0.12); color:var(--danger); border:1px solid rgba(255,61,113,0.3);}

.req-body{padding:12px 16px;}
.req-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid rgba(255,255,255,0.04);}
.req-row:last-child{border-bottom:none;}
.req-lbl{font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.5px;}
.req-val{font-size:14px;font-weight:800;color:#fff;}

.req-actions{padding:12px 16px;display:flex;gap:8px;}
.btn-approve{flex:2;padding:11px;background:linear-gradient(135deg,#059669,#00e676);border:none;border-radius:10px;color:#1a1a1a;font-size:13px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;display:flex;align-items:center;justify-content:center;gap:6px;}
.btn-reject {flex:1;padding:11px;background:rgba(255,61,113,0.1);border:1px solid rgba(255,61,113,0.3);border-radius:10px;color:var(--danger);font-size:13px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;}
.btn-approve:active,.btn-reject:active{transform:scale(.97);}

/* STATS ROW */
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:18px;}
.stat-box{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px;text-align:center;}
.stat-num{font-family:'Rajdhani',sans-serif;font-size:26px;font-weight:700;line-height:1;}
.stat-lbl{font-size:10px;color:var(--muted);font-weight:700;margin-top:3px;text-transform:uppercase;letter-spacing:.5px;}

/* EMPTY */
.empty{text-align:center;padding:50px 20px;color:var(--muted);}
.empty i{font-size:44px;opacity:.2;display:block;margin-bottom:14px;}
.empty p{font-size:13px;font-weight:700;}

/* LOADER */
.loader{text-align:center;padding:40px;color:var(--muted);}
.loader i{font-size:28px;}

/* REFRESH BTN */
.refresh-btn{background:var(--card);border:1px solid var(--border);color:var(--cyan);padding:8px 14px;border-radius:10px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif;display:flex;align-items:center;gap:6px;}
.refresh-btn.spin i{animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

.hidden{display:none!important;}
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="login-screen">
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-title">⚙️ Admin Panel</div>
      <div class="login-sub">Click Eran Pro — Admin Access</div>
      <input class="inp" type="password" id="admin-pass" placeholder="Admin Password" onkeydown="if(event.key==='Enter')doAdminLogin()">
      <button class="login-btn" onclick="doAdminLogin()"><i class="fas fa-lock-open"></i>&nbsp; Login</button>
    </div>
  </div>
</div>

<!-- MAIN PANEL -->
<div id="main-panel" class="hidden">

  <div class="header">
    <div class="header-logo">⚙️ Admin Panel</div>
    <div style="display:flex;align-items:center;gap:10px;">
      <button class="refresh-btn" id="refresh-btn" onclick="loadAll()">
        <i class="fas fa-rotate-right"></i> Refresh
      </button>
      <button class="logout-btn" onclick="doLogout()">Logout</button>
    </div>
  </div>

  <div class="tabs">
    <div class="tab active" id="tab-plans" onclick="switchTab('plans')">
      <i class="fas fa-layer-group"></i> Plans
      <span class="tab-badge" id="pending-badge" style="display:none">0</span>
    </div>
    <div class="tab" id="tab-withdrawals" onclick="switchTab('withdrawals')">
      <i class="fas fa-money-bill-transfer"></i> Withdrawals
      <span class="tab-badge" id="wd-badge" style="display:none">0</span>
    </div>
    <div class="tab" id="tab-users" onclick="switchTab('users')">
      <i class="fas fa-users"></i> Users
    </div>
  </div>

  <div class="page-content">

    <!-- PLANS TAB -->
    <div class="tab-panel active" id="panel-plans">
      <div class="stats-row" id="plan-stats">
        <div class="stat-box"><div class="stat-num" id="s-total" style="color:var(--cyan)">—</div><div class="stat-lbl">Total</div></div>
        <div class="stat-box"><div class="stat-num" id="s-pend"  style="color:var(--warn)">—</div><div class="stat-lbl">Pending</div></div>
        <div class="stat-box"><div class="stat-num" id="s-appr"  style="color:var(--success)">—</div><div class="stat-lbl">Approved</div></div>
      </div>
      <div class="section-title"><i class="fas fa-clock"></i> Plan Requests</div>
      <div id="plans-list"><div class="loader"><i class="fas fa-spinner fa-spin"></i></div></div>
    </div>

    <!-- WITHDRAWALS TAB -->
    <div class="tab-panel" id="panel-withdrawals">
      <div class="section-title"><i class="fas fa-arrow-up-from-bracket"></i> Withdrawal Requests</div>
      <div id="wd-list"><div class="loader"><i class="fas fa-spinner fa-spin"></i></div></div>
    </div>

    <!-- USERS TAB -->
    <div class="tab-panel" id="panel-users">
      <div class="section-title"><i class="fas fa-users"></i> All Users</div>
      <div id="users-list"><div class="loader"><i class="fas fa-spinner fa-spin"></i></div></div>
    </div>

  </div>
</div>

<script>
const API_URL    = "https://script.google.com/macros/s/AKfycby9nskYt756vFC_u5tTpwuA6pg5ynU0FSecXyGTrPVL_tqZEfLwJz2K1zBTEjpphWjJBQ/exec";

// ── LOGIN ────────────────────────────────────────────────────────────────────
async function doAdminLogin() {
  const pass = document.getElementById("admin-pass").value.trim();
  if (!pass) return;
  const btn = document.querySelector(".login-btn");
  btn.disabled = true; btn.innerText = "Checking...";
  try {
    const res  = await fetch(API_URL, { method:"POST", body: JSON.stringify({ action:"admin_login", password: pass }) });
    const data = await res.json();
    if (data.status === "success") {
      sessionStorage.setItem("admin_auth", "1");
      document.getElementById("login-screen").classList.add("hidden");
      document.getElementById("main-panel").classList.remove("hidden");
      loadAll();
    } else {
      Swal.fire({ title:"Galat Password!", icon:"error", confirmButtonColor:"#00c6ff", background:"#0a1025", color:"#fff" });
    }
  } catch(e) {
    Swal.fire({ title:"Connection Error", text:"Server se connect nahi hua", icon:"error", background:"#0a1025", color:"#fff" });
  } finally {
    btn.disabled = false; btn.innerHTML = '<i class="fas fa-lock-open"></i>&nbsp; Login';
  }
}

function doLogout() {
  sessionStorage.removeItem("admin_auth");
  location.reload();
}

// Auto-login if already authed
if (sessionStorage.getItem("admin_auth") === "1") {
  document.getElementById("login-screen").classList.add("hidden");
  document.getElementById("main-panel").classList.remove("hidden");
}

// ── TABS ─────────────────────────────────────────────────────────────────────
function switchTab(name) {
  document.querySelectorAll(".tab").forEach(function(t){ t.classList.remove("active"); });
  document.querySelectorAll(".tab-panel").forEach(function(p){ p.classList.remove("active"); });
  document.getElementById("tab-"   + name).classList.add("active");
  document.getElementById("panel-" + name).classList.add("active");
}

// ── LOAD ALL ─────────────────────────────────────────────────────────────────
async function loadAll() {
  const btn = document.getElementById("refresh-btn");
  btn.classList.add("spin");
  try {
    await Promise.all([ loadPlans(), loadWithdrawals(), loadUsers() ]);
  } finally {
    btn.classList.remove("spin");
  }
}

// ── PLANS ─────────────────────────────────────────────────────────────────────
async function loadPlans() {
  const el = document.getElementById("plans-list");
  try {
    const res  = await fetch(API_URL + "?type=get_pending");
    const data = await res.json();
    const reqs = data.requests || [];

    const total  = reqs.length;
    const pend   = reqs.filter(function(r){ return String(r.status||"").toLowerCase()==="pending"; }).length;
    const appr   = reqs.filter(function(r){ return String(r.status||"").toLowerCase()==="approved"; }).length;

    document.getElementById("s-total").innerText = total;
    document.getElementById("s-pend").innerText  = pend;
    document.getElementById("s-appr").innerText  = appr;

    const badge = document.getElementById("pending-badge");
    if (pend > 0) { badge.innerText = pend; badge.style.display = "inline"; }
    else badge.style.display = "none";

    if (!reqs.length) {
      el.innerHTML = '<div class="empty"><i class="fas fa-inbox"></i><p>Koi request nahi</p></div>'; return;
    }

    el.innerHTML = reqs.map(function(r) {
      const st     = String(r.status || "Pending").toLowerCase();
      const stCls  = st === "approved" ? "st-approved" : st === "rejected" ? "st-rejected" : "st-pending";
      const cCls   = st === "approved" ? "approved" : st === "rejected" ? "rejected" : "pending";
      const date   = r.date ? new Date(r.date).toLocaleString("en-PK",{day:"2-digit",month:"short",hour:"2-digit",minute:"2-digit"}) : "—";
      const isPending = st === "pending";

      return '<div class="req-card ' + cCls + '">' +
        '<div class="req-header">' +
          '<div><div class="req-user">' + esc(r.user_name||"Unknown") + '</div>' +
          '<div class="req-id">' + esc(r.user_id||"") + ' · ' + date + '</div></div>' +
          '<div class="req-status ' + stCls + '">' + (r.status||"Pending") + '</div>' +
        '</div>' +
        '<div class="req-body">' +
          '<div class="req-row"><span class="req-lbl">Plan</span><span class="req-val" style="color:var(--cyan)">' + esc(r.plan_id||"") + '</span></div>' +
          '<div class="req-row"><span class="req-lbl">Amount</span><span class="req-val">Rs. ' + fmt(r.amount) + '</span></div>' +
          '<div class="req-row"><span class="req-lbl">Daily Earn</span><span class="req-val" style="color:var(--success)">Rs. ' + fmt(r.daily_earn) + '</span></div>' +
          '<div class="req-row"><span class="req-lbl">Payment</span><span class="req-val">' + esc(r.pay_method||"") + '</span></div>' +
          '<div class="req-row"><span class="req-lbl">TID / TxHash</span><span class="req-val" style="font-size:12px;word-break:break-all;">' + esc(r.tid||"") + '</span></div>' +
        '</div>' +
        (isPending ? '<div class="req-actions">' +
          '<button class="btn-approve" onclick="approveReq(' + r._row + ')"><i class="fas fa-check"></i> Approve</button>' +
          '<button class="btn-reject"  onclick="rejectReq(' + r._row + ')"><i class="fas fa-times"></i> Reject</button>' +
        '</div>' : '') +
      '</div>';
    }).join("");

  } catch(e) {
    el.innerHTML = '<div class="empty"><i class="fas fa-triangle-exclamation"></i><p>Load failed. Retry.</p></div>';
  }
}

async function approveReq(row) {
  const c = await Swal.fire({
    title:"Approve Plan?", text:"Commission bhi automatically jayegi.",
    icon:"question", showCancelButton:true,
    confirmButtonText:"✅ Approve", confirmButtonColor:"#00e676",
    cancelButtonColor:"#ff3d71", background:"#0a1025", color:"#fff"
  });
  if (!c.isConfirmed) return;

  Swal.fire({ title:"Processing...", allowOutsideClick:false, background:"#0a1025", color:"#fff", didOpen:function(){ Swal.showLoading(); } });

  try {
    const res  = await fetch(API_URL, { method:"POST", body: JSON.stringify({ action:"approve_plan", row }) });
    const data = await res.json();
    Swal.fire({ title: data.status==="success" ? "Approved! ✅" : "Error", text: data.message||"", icon: data.status==="success"?"success":"error", background:"#0a1025", color:"#fff", timer:2000, showConfirmButton:false });
    loadPlans();
  } catch(e) {
    Swal.fire({ title:"Error", text:"Connection failed", icon:"error", background:"#0a1025", color:"#fff" });
  }
}

async function rejectReq(row) {
  const c = await Swal.fire({
    title:"Reject Request?", input:"text", inputPlaceholder:"Reason (optional)",
    showCancelButton:true, confirmButtonText:"Reject", confirmButtonColor:"#ff3d71",
    background:"#0a1025", color:"#fff", inputAttributes:{ style:"background:#060d1f;color:#fff;border:1px solid #1a2545;border-radius:8px;padding:10px;" }
  });
  if (!c.isConfirmed) return;

  const res  = await fetch(API_URL, { method:"POST", body: JSON.stringify({ action:"reject_plan", row, reason: c.value||"Rejected" }) });
  const data = await res.json();
  Swal.fire({ title:"Rejected", icon:"info", background:"#0a1025", color:"#fff", timer:1500, showConfirmButton:false });
  loadPlans();
}

// ── WITHDRAWALS ──────────────────────────────────────────────────────────────
async function loadWithdrawals() {
  const el = document.getElementById("wd-list");
  try {
    const res  = await fetch(API_URL + "?type=get_withdrawals_all");
    const data = await res.json();
    const wds  = data.withdrawals || [];

    const pend = wds.filter(function(w){ return String(w.status||"").toLowerCase()==="pending"; }).length;
    const badge = document.getElementById("wd-badge");
    if (pend > 0) { badge.innerText = pend; badge.style.display = "inline"; }
    else badge.style.display = "none";

    if (!wds.length) {
      el.innerHTML = '<div class="empty"><i class="fas fa-inbox"></i><p>Koi withdrawal nahi</p></div>'; return;
    }

    el.innerHTML = wds.map(function(w) {
      const st    = String(w.status||"Pending").toLowerCase();
      const stCls = st==="approved"?"st-approved":st==="rejected"?"st-rejected":"st-pending";
      const cCls  = st==="approved"?"approved":st==="rejected"?"rejected":"pending";
      const date  = w.date ? new Date(w.date).toLocaleString("en-PK",{day:"2-digit",month:"short",hour:"2-digit",minute:"2-digit"}) : "—";
      const isPending = st==="pending";

      return '<div class="req-card ' + cCls + '">' +
        '<div class="req-header">' +
          '<div><div class="req-user">' + esc(w.user_id||"") + '</div>' +
          '<div class="req-id">' + date + '</div></div>' +
          '<div class="req-status ' + stCls + '">' + (w.status||"Pending") + '</div>' +
        '</div>' +
        '<div class="req-body">' +
          '<div class="req-row"><span class="req-lbl">Amount</span><span class="req-val">Rs. ' + fmt(w.amount) + '</span></div>' +
          '<div class="req-row"><span class="req-lbl">Net (after 5%)</span><span class="req-val" style="color:var(--success)">Rs. ' + fmt(w.net_amount) + '</span></div>' +
          '<div class="req-row"><span class="req-lbl">Method</span><span class="req-val">' + esc(w.account_type||"") + '</span></div>' +
          '<div class="req-row"><span class="req-lbl">Account</span><span class="req-val" style="font-size:12px;">' + esc(w.account_no||"") + '</span></div>' +
          '<div class="req-row"><span class="req-lbl">Title</span><span class="req-val">' + esc(w.account_title||"") + '</span></div>' +
        '</div>' +
        (isPending ? '<div class="req-actions">' +
          '<button class="btn-approve" onclick="approveWd(' + w._row + ')"><i class="fas fa-check"></i> Mark Paid</button>' +
        '</div>' : '') +
      '</div>';
    }).join("");

  } catch(e) {
    el.innerHTML = '<div class="empty"><i class="fas fa-triangle-exclamation"></i><p>Load failed.</p></div>';
  }
}

async function approveWd(row) {
  const c = await Swal.fire({ title:"Mark as Paid?", icon:"question", showCancelButton:true, confirmButtonText:"✅ Mark Paid", confirmButtonColor:"#00e676", background:"#0a1025", color:"#fff" });
  if (!c.isConfirmed) return;
  const res  = await fetch(API_URL, { method:"POST", body: JSON.stringify({ action:"approve_withdrawal", row }) });
  const data = await res.json();
  Swal.fire({ title:"Done! ✅", icon:"success", background:"#0a1025", color:"#fff", timer:1500, showConfirmButton:false });
  loadWithdrawals();
}

// ── USERS ────────────────────────────────────────────────────────────────────
async function loadUsers() {
  const el = document.getElementById("users-list");
  try {
    const res  = await fetch(API_URL + "?type=get_dashboard&userId=_all_users_");
    // get_dashboard won't return all users, use a workaround via team of a dummy
    // Instead load from users via plan requests user_ids
    const res2 = await fetch(API_URL + "?type=get_pending");
    const data = await res2.json();
    const reqs = data.requests || [];

    // Collect unique user IDs
    const seen = {};
    const users = [];
    reqs.forEach(function(r){
      if (r.user_id && !seen[r.user_id]) {
        seen[r.user_id] = true;
        users.push({ user_id: r.user_id, name: r.user_name, plan: r.plan_id, status: r.status });
      }
    });

    if (!users.length) {
      el.innerHTML = '<div class="empty"><i class="fas fa-users"></i><p>Users yahan tab nazar aayenge jab plan requests aayein</p></div>'; return;
    }

    el.innerHTML = users.map(function(u){
      return '<div class="req-card">' +
        '<div class="req-header">' +
          '<div><div class="req-user">' + esc(u.name||"") + '</div>' +
          '<div class="req-id">' + esc(u.user_id||"") + '</div></div>' +
          '<div class="req-status st-approved">' + esc(u.plan||"—") + '</div>' +
        '</div>' +
      '</div>';
    }).join("");
  } catch(e) {
    el.innerHTML = '<div class="empty"><i class="fas fa-triangle-exclamation"></i><p>Load failed.</p></div>';
  }
}

// ── HELPERS ──────────────────────────────────────────────────────────────────
function esc(s){ return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function fmt(n){ return parseFloat(n||0).toLocaleString(); }

window.addEventListener("DOMContentLoaded", function(){
  if (sessionStorage.getItem("admin_auth")==="1") loadAll();
