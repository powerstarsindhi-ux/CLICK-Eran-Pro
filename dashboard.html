<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Click Eran Pro | Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<!-- AUTH GUARD -->
<script>
(function() {
  var anUser   = localStorage.getItem("anUser");
  var anOld    = localStorage.getItem("an_user");
  var loggedIn = localStorage.getItem("anLoggedIn");

  if (anUser && !anOld)  { localStorage.setItem("an_user",  anUser);  anOld  = anUser;  }
  if (anOld  && !anUser) { localStorage.setItem("anUser",   anOld);   localStorage.setItem("anLoggedIn","true"); }

  var userData = anOld || anUser;
  if (!userData) window.location.replace("auth.html");
})();
</script>

<style>
:root{
  --bg:#030714; --card:#0a1025; --card-dark:#060d1f;
  --border:#1a2545; --cyan:#00c6ff; --purple:#9333ea;
  --grad:linear-gradient(135deg,#00c6ff,#9333ea);
  --muted:#6b7fa3; --success:#00e676; --danger:#ff3d71;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:#fff;padding-bottom:90px;overflow-x:hidden;}

/* grid bg */
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background-image:linear-gradient(rgba(0,198,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,198,255,0.03) 1px,transparent 1px);background-size:40px 40px;}

/* ── HEADER ── */
.header{padding:16px 20px;background:#080f22;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;display:flex;justify-content:space-between;align-items:center;backdrop-filter:blur(12px);}
.header-logo{font-family:'Rajdhani',sans-serif;font-size:22px;font-weight:700;letter-spacing:2px;text-transform:uppercase;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.header-actions{display:flex;gap:16px;align-items:center;}

/* ── USER META BAR ── */
.user-meta{display:flex;align-items:center;justify-content:space-between;padding:10px 20px;background:#06100e;border-bottom:1px solid var(--border);font-size:12px;position:relative;z-index:1;}
.user-name{font-weight:700;color:var(--muted);}
.id-badge{background:rgba(0,198,255,0.1);color:var(--cyan);padding:4px 12px;border-radius:8px;border:1px solid rgba(0,198,255,0.25);font-weight:800;font-family:'Rajdhani',sans-serif;letter-spacing:1px;cursor:pointer;display:flex;align-items:center;gap:6px;}

/* ── BALANCE CARD ── */
.balance-card{margin:20px;border-radius:24px;padding:32px 24px;text-align:center;position:relative;overflow:hidden;z-index:1;}
.balance-card-inner{background:var(--grad);border-radius:24px;padding:32px 24px;text-align:center;position:relative;box-shadow:0 0 50px rgba(0,198,255,0.2),0 12px 40px rgba(0,0,0,0.4);}
.balance-card-inner::before{content:'';position:absolute;inset:0;border-radius:24px;background:linear-gradient(135deg,rgba(255,255,255,0.08),transparent);pointer-events:none;}
.history-icon{position:absolute;right:18px;top:18px;color:#fff;background:rgba(255,255,255,0.15);padding:10px;border-radius:50%;cursor:pointer;font-size:15px;transition:0.2s;backdrop-filter:blur(4px);}
.history-icon:hover{background:rgba(255,255,255,0.25);}
.bal-label{font-size:12px;font-weight:700;opacity:0.8;margin-bottom:6px;letter-spacing:1px;text-transform:uppercase;}
.bal-amount{font-family:'Rajdhani',sans-serif;font-size:38px;font-weight:700;letter-spacing:1px;}
.income-btn{background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.3);color:#fff;padding:10px 22px;border-radius:12px;font-weight:700;font-size:13px;cursor:pointer;margin-top:16px;display:inline-block;backdrop-filter:blur(4px);transition:0.2s;}
.income-btn:active{transform:scale(0.96);}

/* ── ANNOUNCEMENT ── */
.news-box{margin:0 20px 20px;background:rgba(0,198,255,0.07);border:1px solid rgba(0,198,255,0.2);padding:10px 14px;border-radius:14px;display:flex;align-items:center;gap:10px;position:relative;z-index:1;}
.news-pill{background:var(--grad);color:#fff;padding:3px 10px;border-radius:6px;font-size:10px;font-weight:800;white-space:nowrap;letter-spacing:0.5px;}
.news-box marquee{font-size:13px;font-weight:600;color:#c8e8ff;}


/* ── POPUP ── */
.popup-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:9998;align-items:center;justify-content:center;padding:20px;}
.popup-overlay.show{display:flex;}
.popup-box{background:var(--card);border:1px solid var(--border);border-radius:22px;max-width:420px;width:100%;padding:28px 24px;position:relative;box-shadow:0 0 40px rgba(0,198,255,0.12);}
.popup-box::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--grad);border-radius:22px 22px 0 0;}
.popup-title{font-family:'Rajdhani',sans-serif;font-size:18px;font-weight:700;color:var(--cyan);margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.popup-msg{font-size:14px;color:#c8e8ff;line-height:1.7;font-weight:600;}
.popup-close{display:block;width:100%;margin-top:20px;padding:12px;background:var(--grad);border:none;border-radius:12px;color:#fff;font-size:14px;font-weight:800;cursor:pointer;font-family:'Nunito',sans-serif;letter-spacing:0.5px;}
.popup-close:active{transform:scale(0.97);}

.nav-bar{position:fixed;bottom:0;width:100%;background:#080f22;display:flex;justify-content:space-around;padding:12px 0;border-top:1px solid var(--border);z-index:1000;}
.nav-link{color:var(--muted);text-decoration:none;font-size:10px;text-align:center;font-weight:700;letter-spacing:0.3px;transition:0.2s;}
.nav-link i{font-size:20px;display:block;margin-bottom:4px;}
.nav-link.active{color:var(--cyan);}
.nav-link.active i{text-shadow:0 0 12px rgba(0,198,255,0.5);}

/* ── HISTORY MODAL ── */
.history-modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.88);z-index:9999;align-items:center;justify-content:center;padding:20px;}
.history-modal.show{display:flex;}
.history-content{background:var(--card);border-radius:22px;border:1px solid var(--border);max-width:500px;width:100%;max-height:82vh;overflow-y:auto;position:relative;}
.history-header{padding:20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:var(--card);z-index:1;border-radius:22px 22px 0 0;}
.history-header h3{font-size:17px;font-weight:800;color:var(--cyan);font-family:'Rajdhani',sans-serif;letter-spacing:1px;}
.close-modal{background:rgba(255,61,113,0.1);border:1px solid #ff3d71;color:#ff3d71;padding:6px 14px;border-radius:8px;cursor:pointer;font-size:12px;font-weight:700;}
.history-body{padding:15px 20px;}
.history-item{background:var(--card-dark);padding:14px;border-radius:12px;margin-bottom:10px;border:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.history-type{font-size:14px;font-weight:700;color:#fff;}
.history-amount{font-size:16px;font-weight:900;}
</style>
</head>
<body>

<div class="header">
  <div class="header-logo">Click<span style="-webkit-text-fill-color:var(--cyan)">Eran Pro</span></div>
  <div class="header-actions">
    <i class="fa-solid fa-headset" style="color:var(--cyan);font-size:18px;cursor:pointer;"></i>
    <i class="fa-solid fa-right-from-bracket" onclick="logout()" style="color:var(--danger);font-size:18px;cursor:pointer;"></i>
  </div>
</div>

<div class="user-meta">
  <span class="user-name" id="u-name">Loading...</span>
  <div class="id-badge" onclick="copyID()">
    <span id="u-id">CE####</span>
    <i class="fa-regular fa-copy" style="font-size:10px;opacity:0.8;"></i>
  </div>
</div>

<div style="position:relative;z-index:1;">
  <div class="balance-card" style="padding:0;margin:20px;">
    <div class="balance-card-inner">
      <div class="history-icon" onclick="openHistory()">
        <i class="fa-solid fa-clock-rotate-left"></i>
      </div>
      <div class="bal-label">Available Balance</div>
      <div class="bal-amount">Rs. <span id="u-bal">0.00</span></div>
      <div class="income-btn" onclick="showIncome()">
        <i class="fa-solid fa-chart-line"></i>&nbsp; View Income
      </div>
    </div>
  </div>
</div>

<div class="news-box">
  <span class="news-pill">LIVE</span>
  <marquee id="news-text" style="font-size:13px;font-weight:600;color:#c8e8ff;">Syncing with server...</marquee>
</div>


<nav class="nav-bar">
  <a href="dashboard.html" class="nav-link active"><i class="fa-solid fa-house-signal"></i>Home</a>
  <a href="ads.html" class="nav-link"><i class="fa-solid fa-rectangle-ad"></i>Ads</a>
  <a href="team.html" class="nav-link"><i class="fa-solid fa-people-group"></i>Team</a>
  <a href="wallet.html" class="nav-link"><i class="fa-solid fa-wallet"></i>Wallet</a>
</nav>

<div class="history-modal" id="history-modal">
  <div class="history-content">
    <div class="history-header">
      <h3><i class="fa-solid fa-receipt"></i>&nbsp; Transaction History</h3>
      <button class="close-modal" onclick="closeHistory()">CLOSE</button>
    </div>
    <div class="history-body" id="history-body">
      <p style="text-align:center;color:var(--muted);padding:30px;">Loading...</p>
    </div>
  </div>
</div>

<!-- Admin Popup -->
<div class="popup-overlay" id="admin-popup">
  <div class="popup-box">
    <div class="popup-title"><i class="fa-solid fa-bullhorn"></i> Admin Message</div>
    <div class="popup-msg" id="popup-msg-text"></div>
    <button class="popup-close" onclick="document.getElementById('admin-popup').classList.remove('show')">
      <i class="fa-solid fa-check"></i>&nbsp; OK, Got It!
    </button>
  </div>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbwCTVJhXSqd4GA8R0zaHd1hFhQIA9eLSbzJnMe_IX4-5bH8itjfdHJAJfMhZYZNrWe99w/exec";

const CACHE_SETTINGS = "an_cached_settings";
const CACHE_TIME     = "an_cache_ts";
const CACHE_TTL      = 5 * 60 * 1000;

function getUser() {
  try { return JSON.parse(localStorage.getItem("anUser") || localStorage.getItem("an_user") || "null"); }
  catch(e) { return null; }
}

function renderUser(u) {
  document.getElementById("u-name").innerText = u.name  || "—";
  document.getElementById("u-id").innerText   = u.user_id || "—";
  document.getElementById("u-bal").innerText  = parseFloat(u.balance || 0).toFixed(2);
}

function renderSettings(s) {
  if (s.announcement) document.getElementById("news-text").innerText = s.announcement;
  // Admin popup — show once per session
  if (s.popup_message && String(s.popup_message).trim()) {
    if (!sessionStorage.getItem("popup_shown")) {
      document.getElementById("popup-msg-text").innerText = s.popup_message;
      document.getElementById("admin-popup").classList.add("show");
      sessionStorage.setItem("popup_shown", "1");
    }
  }
}

async function syncDashboard() {
  const localUser = getUser();
  if (!localUser) { window.location.replace("auth.html"); return; }

  renderUser(localUser);

  try {
    const cachedSettings = JSON.parse(localStorage.getItem(CACHE_SETTINGS) || "null");
    if (cachedSettings) renderSettings(cachedSettings);
  } catch(e) {}

  const lastFetch = parseInt(localStorage.getItem(CACHE_TIME) || "0");
  const now       = Date.now();
  if ((now - lastFetch) < CACHE_TTL) return;

  try {
    const res  = await fetch(API_URL + "?type=get_dashboard&userId=" + encodeURIComponent(localUser.user_id || ""));
    const data = await res.json();

    if (data.status === "success") {
      if (data.user) {
        const merged = Object.assign({}, localUser, data.user);
        localStorage.setItem("anUser",  JSON.stringify(merged));
        localStorage.setItem("an_user", JSON.stringify(merged));
        localStorage.setItem("anID",    merged.user_id);
        renderUser(merged);
      }
      if (data.settings) {
        localStorage.setItem(CACHE_SETTINGS, JSON.stringify(data.settings));
        renderSettings(data.settings);
      }
      localStorage.setItem(CACHE_TIME, String(now));
    }
  } catch(e) { console.log("Sync failed:", e.message); }
}

async function openHistory() {
  document.getElementById("history-modal").classList.add("show");
  const hb = document.getElementById("history-body");

  try {
    const cached = JSON.parse(localStorage.getItem("an_cached_history") || "null");
    if (cached && cached.length) {
      renderHistory(hb, cached);
      const localUser = getUser();
      if (localUser) {
        fetch(API_URL + "?type=get_history&userId=" + encodeURIComponent(localUser.user_id || ""))
          .then(function(r){ return r.json(); })
          .then(function(data){
            if (data.status === "success" && data.history && data.history.length) {
              localStorage.setItem("an_cached_history", JSON.stringify(data.history));
              renderHistory(hb, data.history);
            }
          }).catch(function(){});
      }
      return;
    }
  } catch(e) {}

  hb.innerHTML = '<p style="text-align:center;padding:30px;color:var(--muted);"><i class="fas fa-spinner fa-spin"></i> Loading...</p>';
  const localUser = getUser();
  if (!localUser) return;

  try {
    const res  = await fetch(API_URL + "?type=get_history&userId=" + encodeURIComponent(localUser.user_id || ""));
    const data = await res.json();
    if (data.status !== "success" || !data.history || !data.history.length) {
      hb.innerHTML = '<p style="text-align:center;padding:30px;color:var(--muted);">No history yet.</p>'; return;
    }
    localStorage.setItem("an_cached_history", JSON.stringify(data.history));
    renderHistory(hb, data.history);
  } catch(e) { hb.innerHTML = '<p style="text-align:center;padding:20px;color:var(--danger);">Load failed.</p>'; }
}

function renderHistory(hb, list) {
  const colorMap = { "Salary":"#00e676","Commission":"var(--cyan)","Reward":"var(--purple)","Bonus":"#ff9d00","Withdrawal":"#ff9d00","Rejected":"var(--danger)","Deduction":"var(--danger)" };
  let html = "";
  list.forEach(function(h) {
    const color = colorMap[h.type] || "#6b7fa3";
    const sign  = (h.type==="Withdrawal"||h.type==="Rejected"||h.type==="Deduction") ? "−" : "+";
    const date  = new Date(h.date).toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"numeric"});
    html += '<div class="history-item"><div><div class="history-type">' + (h.title||h.type) + '</div><div style="font-size:11px;color:var(--muted);margin-top:3px;">' + date + '</div></div><div style="text-align:right"><div class="history-amount" style="color:' + color + '">' + sign + ' Rs. ' + parseFloat(h.amount).toFixed(2) + '</div>' + (h.status ? '<div style="font-size:11px;font-weight:700;color:' + color + '">' + h.status + '</div>' : '') + '</div></div>';
  });
  hb.innerHTML = html;
}

function closeHistory() {
  document.getElementById("history-modal").classList.remove("show");
  localStorage.removeItem("an_cached_history");
}

function showIncome() {
  const user = getUser();
  Swal.fire({
    title:'<strong>📊 Your Income</strong>',
    html:'<div style="text-align:left;padding:10px;"><p><b>Balance:</b> Rs. ' + parseFloat(user.balance||0).toFixed(2) + '</p><p><b>User ID:</b> ' + user.user_id + '</p></div>',
    icon:'info', confirmButtonColor:'#00c6ff'
  });
}

function logout() {
  ["an_user","anUser","anLoggedIn","anID","an_cached_settings","an_cached_history","an_cache_ts"]
    .forEach(function(k){ localStorage.removeItem(k); });
  window.location.replace("auth.html");
}

function copyID() {
  const idText = document.getElementById("u-id").innerText;
  navigator.clipboard.writeText(idText).then(function() {
    Swal.mixin({ toast:true, position:'top-end', showConfirmButton:false, timer:2000, background:'#0a1025', color:'#fff' })
      .fire({ icon:'success', title:'Copied: ' + idText });
  });
}

async function prefetchHistory() {
  const localUser = getUser();
  if (!localUser || !localUser.user_id) return;
  try {
    const res  = await fetch(API_URL + '?type=get_history&userId=' + encodeURIComponent(localUser.user_id));
    const data = await res.json();
    if (data.status === 'success' && data.history && data.history.length)
      localStorage.setItem('an_cached_history', JSON.stringify(data.history));
  } catch(e) {}
}

document.addEventListener('DOMContentLoaded', function() {
  syncDashboard();
  setTimeout(prefetchHistory, 1500);
});
</script>
</body>
</html>
