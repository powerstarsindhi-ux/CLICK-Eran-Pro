<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>My Network | AdNova</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root{
  --bg:#030714; --card:#0a1025; --card-dark:#060d1f;
  --border:#1a2545; --cyan:#00c6ff; --purple:#9333ea;
  --grad:linear-gradient(135deg,#00c6ff,#9333ea);
  --muted:#6b7fa3; --success:#00e676; --danger:#ff3d71;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{min-height:100%;font-family:'Nunito',sans-serif;background:var(--bg);color:#fff;-webkit-font-smoothing:antialiased;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background-image:linear-gradient(rgba(0,198,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,198,255,0.03) 1px,transparent 1px);background-size:40px 40px;}

/* ── TOP BAR ── */
.topbar{position:sticky;top:0;z-index:100;background:rgba(3,7,20,0.95);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:14px 18px;gap:14px;}
.back-btn{width:38px;height:38px;background:var(--card);border:1px solid var(--border);border-radius:12px;display:flex;align-items:center;justify-content:center;cursor:pointer;text-decoration:none;color:#fff;font-size:15px;transition:0.2s;flex-shrink:0;}
.back-btn:active{transform:scale(0.92);}
.topbar-title{font-family:'Rajdhani',sans-serif;font-size:20px;font-weight:700;flex:1;letter-spacing:1px;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.refresh-btn{width:38px;height:38px;background:var(--card);border:1px solid var(--border);border-radius:12px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--cyan);font-size:15px;flex-shrink:0;}
.refresh-btn.spinning i{animation:spin 0.7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ── REF CARD ── */
.ref-card{margin:18px 16px 0;background:var(--card);border:1px solid var(--border);border-radius:22px;padding:22px;position:relative;overflow:hidden;}
.ref-card::before{content:'';position:absolute;top:-40px;right:-40px;width:150px;height:150px;background:radial-gradient(circle,rgba(0,198,255,0.10) 0%,transparent 70%);pointer-events:none;}
.ref-card::after{content:'';position:absolute;bottom:-40px;left:-40px;width:120px;height:120px;background:radial-gradient(circle,rgba(147,51,234,0.10) 0%,transparent 70%);pointer-events:none;}

.ref-label{font-size:10px;color:var(--muted);font-weight:800;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;}
.ref-id-row{display:flex;align-items:center;gap:12px;margin-bottom:16px;}
.ref-id{font-family:'Rajdhani',sans-serif;font-size:28px;font-weight:700;letter-spacing:2px;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.copy-btn{background:rgba(0,198,255,0.1);border:1px solid rgba(0,198,255,0.25);color:var(--cyan);border-radius:10px;padding:7px 16px;font-size:12px;font-weight:700;cursor:pointer;transition:0.2s;}
.copy-btn:active{transform:scale(0.94);}

.ref-link-box{background:var(--card-dark);border:1px solid var(--border);border-radius:12px;padding:11px 14px;display:flex;align-items:center;gap:8px;}
.ref-link-box span{flex:1;font-size:12px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.link-copy{background:none;border:none;color:var(--cyan);font-size:14px;cursor:pointer;padding:0;}

/* ── STATS ── */
.stats-row{display:flex;gap:12px;margin:14px 16px 0;}
.stat-box{flex:1;background:var(--card);border:1px solid var(--border);border-radius:16px;padding:18px 12px;text-align:center;position:relative;overflow:hidden;}
.stat-box::before{content:'';position:absolute;inset:0;background:var(--grad);opacity:0;transition:0.2s;}
.stat-num{font-family:'Rajdhani',sans-serif;font-size:28px;font-weight:700;color:var(--cyan);}
.stat-lbl{font-size:11px;color:var(--muted);margin-top:3px;font-weight:700;letter-spacing:0.5px;}

/* ── SECTION TITLE ── */
.sec-title{font-size:11px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin:22px 16px 12px;display:flex;align-items:center;gap:8px;}
.sec-title::after{content:'';flex:1;height:1px;background:var(--border);}

/* ── MEMBER LIST ── */
.member-list{padding:0 16px;display:flex;flex-direction:column;gap:10px;}
.member-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:14px 16px;display:flex;align-items:center;gap:14px;animation:fadeUp 0.3s ease both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}

.avatar{width:46px;height:46px;border-radius:14px;background:var(--grad);display:flex;align-items:center;justify-content:center;font-family:'Rajdhani',sans-serif;font-size:20px;font-weight:700;color:#fff;flex-shrink:0;}
.member-info{flex:1;min-width:0;}
.member-name{font-size:15px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.member-id{font-size:12px;color:var(--muted);margin-top:2px;font-family:'Rajdhani',sans-serif;letter-spacing:0.5px;}
.member-date{font-size:11px;color:#3d527a;margin-top:2px;}
.level-badge{font-size:10px;font-weight:800;padding:3px 8px;border-radius:6px;margin-top:4px;display:inline-block;}
.lv1{background:rgba(0,198,255,0.12);color:var(--cyan);}
.lv2{background:rgba(147,51,234,0.12);color:var(--purple);}

.status-badge{font-size:11px;font-weight:800;padding:5px 12px;border-radius:20px;flex-shrink:0;}
.s-active{background:rgba(0,230,118,0.12);color:var(--success);}
.s-inactive{background:rgba(255,61,113,0.12);color:var(--danger);}

/* ── SKELETON ── */
.skeleton-list{padding:0 16px;display:flex;flex-direction:column;gap:10px;}
.skeleton-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:14px 16px;display:flex;align-items:center;gap:14px;}
.sk{background:#0f1e38;border-radius:8px;animation:pulse 1.4s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.3;}}
.sk-av{width:46px;height:46px;border-radius:14px;flex-shrink:0;}
.sk-col{flex:1;display:flex;flex-direction:column;gap:8px;}
.sk-l1{height:14px;width:55%;}
.sk-l2{height:11px;width:38%;}

/* ── EMPTY ── */
.empty-state{display:none;text-align:center;padding:50px 20px;}
.empty-icon{font-size:54px;margin-bottom:16px;opacity:0.3;}
.empty-state h3{font-size:18px;font-weight:800;margin-bottom:8px;}
.empty-state p{font-size:13px;color:var(--muted);line-height:1.6;}
.bottom-pad{height:36px;}
</style>
</head>
<body>

<!-- AUTH GUARD -->
<script>
(function() {
  if (localStorage.getItem("anLoggedIn") !== "true" || !localStorage.getItem("anID")) {
    window.location.replace("auth.html"); return;
  }
  try { window.CU = JSON.parse(localStorage.getItem("anUser") || "{}"); }
  catch(e) { localStorage.clear(); window.location.replace("auth.html"); }
})();
</script>

<div class="topbar">
  <a href="dashboard.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
  <span class="topbar-title">⚡ My Network</span>
  <div class="refresh-btn" id="refreshBtn" onclick="loadTeam()">
    <i class="fas fa-rotate-right"></i>
  </div>
</div>

<div class="ref-card">
  <div class="ref-label">Your Referral Code</div>
  <div class="ref-id-row">
    <div class="ref-id" id="myRefCode">—</div>
    <button class="copy-btn" onclick="copyCode()"><i class="fas fa-copy"></i>&nbsp; Copy</button>
  </div>
  <div class="ref-link-box">
    <span id="refLinkText">Loading...</span>
    <button class="link-copy" onclick="copyLink()" title="Copy link"><i class="fas fa-link"></i></button>
  </div>
</div>

<div class="stats-row">
  <div class="stat-box">
    <div class="stat-num" id="totalCount">—</div>
    <div class="stat-lbl">Total</div>
  </div>
  <div class="stat-box">
    <div class="stat-num" id="activeCount" style="color:var(--success)">—</div>
    <div class="stat-lbl">Active</div>
  </div>
  <div class="stat-box">
    <div class="stat-num" id="inactiveCount" style="color:var(--danger)">—</div>
    <div class="stat-lbl">Inactive</div>
  </div>
</div>

<div class="sec-title">Network Members</div>

<div class="skeleton-list" id="skelArea">
  <div class="skeleton-card"><div class="sk sk-av"></div><div class="sk-col"><div class="sk sk-l1"></div><div class="sk sk-l2"></div></div></div>
  <div class="skeleton-card"><div class="sk sk-av"></div><div class="sk-col"><div class="sk sk-l1"></div><div class="sk sk-l2"></div></div></div>
  <div class="skeleton-card"><div class="sk sk-av"></div><div class="sk-col"><div class="sk sk-l1"></div><div class="sk sk-l2"></div></div></div>
</div>

<div class="member-list" id="memberList"></div>

<div class="empty-state" id="emptyState">
  <div class="empty-icon">📡</div>
  <h3>No Network Members Yet</h3>
  <p>Share your referral code<br>and start growing your network!</p>
</div>

<div class="bottom-pad"></div>

<script>
const GAS_URL  = "https://script.google.com/macros/s/AKfycbzzGlpsvHwCiXtYs7Xu6YxlcEM5GVwZksSc_ZYRIPQkhxzwI3YlY6--2au72EkgyfdUpw/exec"; // ← Apna GAS Web App URL yahan daalen
const userId   = window.CU.user_id || "";
const refLink  = "https://powerstarsindhi-ux.github.io/CLICK-Eran-Pro/" + userId;

document.getElementById("myRefCode").textContent  = userId;
document.getElementById("refLinkText").textContent = refLink;

function copyCode() {
  navigator.clipboard.writeText(userId).then(() =>
    Swal.fire({ icon:"success", title:"Copied!", text:"Referral code copied.", timer:1200, showConfirmButton:false })
  );
}

function copyLink() {
  navigator.clipboard.writeText(refLink).then(() =>
    Swal.fire({ icon:"success", title:"Link Copied!", text:"Share karo aur kamao!", timer:1200, showConfirmButton:false })
  );
}

async function loadTeam() {
  const btn = document.getElementById("refreshBtn");
  btn.classList.add("spinning");
  document.getElementById("skelArea").style.display    = "flex";
  document.getElementById("memberList").innerHTML      = "";
  document.getElementById("emptyState").style.display = "none";
  document.getElementById("totalCount").textContent    = "—";
  document.getElementById("activeCount").textContent   = "—";
  document.getElementById("inactiveCount").textContent = "—";

  try {
    const res  = await fetch(GAS_URL + "?type=get_team&userId=" + encodeURIComponent(userId));
    const data = await res.json();

    document.getElementById("skelArea").style.display = "none";
    btn.classList.remove("spinning");

    if (data.status !== "success") {
      Swal.fire("Error", data.message || "Team load nahi hoi.", "error"); return;
    }

    const team     = data.team || [];
    const active   = team.filter(m => !m.status || m.status.toLowerCase() === "active").length;
    const inactive = team.length - active;

    document.getElementById("totalCount").textContent    = team.length;
    document.getElementById("activeCount").textContent   = active;
    document.getElementById("inactiveCount").textContent = inactive;

    if (team.length === 0) {
      document.getElementById("emptyState").style.display = "block"; return;
    }

    const list = document.getElementById("memberList");
    team.forEach((m, i) => {
      const initial  = (m.name || "?").charAt(0).toUpperCase();
      const isActive = !m.status || m.status.toLowerCase() === "active";
      const joined   = m.joined_at ? _fmtDate(m.joined_at) : "—";
      const lvl      = m.level || 1;

      const card = document.createElement("div");
      card.className = "member-card";
      card.style.animationDelay = (i * 0.05) + "s";
      card.innerHTML = `
        <div class="avatar">${initial}</div>
        <div class="member-info">
          <div class="member-name">${_esc(m.name || "Unknown")}</div>
          <div class="member-id">${_esc(m.user_id || "")}</div>
          <div class="member-date"><i class="fas fa-calendar" style="font-size:9px;margin-right:3px;"></i>${joined}</div>
          <span class="level-badge ${lvl===1?'lv1':'lv2'}">Level ${lvl}</span>
        </div>
        <span class="status-badge ${isActive?'s-active':'s-inactive'}">
          ${isActive ? '● Active' : '● Inactive'}
        </span>`;
      list.appendChild(card);
    });

  } catch(err) {
    document.getElementById("skelArea").style.display = "none";
    btn.classList.remove("spinning");
    Swal.fire("Error", "Connection failed. Check internet.", "error");
  }
}

function _fmtDate(iso) {
  try { return new Date(iso).toLocaleDateString("en-PK",{day:"2-digit",month:"short",year:"numeric"}); }
  catch(e) { return "—"; }
}

function _esc(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

window.addEventListener("load", loadTeam);
</script>
</body>
</html>
